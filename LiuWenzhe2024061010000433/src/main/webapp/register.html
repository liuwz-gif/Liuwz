<%@ page contentType="text/html;charset=UTF-8" language="java" %>
<html>
<head>
    <title>用户注册</title>
    <style>.tips{color:red;font-size:12px;}</style>
    <script>
        function checkForm(){
            let username=document.getElementById("username").value.trim();
            let pwd=document.getElementById("pwd").value;
            let repwd=document.getElementById("repwd").value;
            let email=document.getElementById("email").value.trim();
            let sex=document.getElementsByName("sex");

            if(username==""){alert("用户名不能为空！");return false;}
            if(pwd.length<6){alert("密码至少6位！");return false;}
            if(pwd!=repwd){alert("两次密码不一致！");return false;}
            let reg=/^[a-zA-Z0-9]+@[a-zA-Z0-9]+\.com$/;
            if(!reg.test(email)){alert("邮箱格式：xxx@xxx.com");return false;}
            let flag=false;
            for(let i=0;i<sex.length;i++){if(sex[i].checked)flag=true;}
            if(!flag){alert("请选择性别！");return false;}
            return true;
        }
    </script>
</head>
<body>
<h2>用户注册</h2>
<form onsubmit="return checkForm()" method="post">
    用户名：<input type="text" id="username"><br><br>
    密码：<input type="password" id="pwd"><span class="tips">≥6位</span><br><br>
    确认密码：<input type="password" id="repwd"><br><br>
    邮箱：<input type="text" id="email"><span class="tips">xxx@xxx.com</span><br><br>
    性别：<input type="radio" name="sex" value="男">男 <input type="radio" name="sex" value="女">女<br><br>
    <input type="submit" value="注册"> <input type="reset" value="重置">
</form>
</body>
</html>
